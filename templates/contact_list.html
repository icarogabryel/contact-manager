{% {% extends "components/base.html" %}%}

{% block content %}
    <h1>Contact List</h1>
    <ul>
        {% for contact in contacts %}
            <li>{{ contact.name }} - {{ contact.email }} - {{ contact.phone }}</li>
        {% empty %}
            <li>No contacts available.</li>
        {% endfor %}
    </ul>
{% endblock %}
